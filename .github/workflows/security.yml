name: Security Check
on: [push]
jobs:
  bandit:
    name: Run Bandit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Укажите версию Python, актуальную для вашего проекта
          cache: 'pip'           # Кэширование пакетов для ускорения сборки

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run Bandit Scan
        # Запускаем рекурсивно (-r) по всей текущей директории (.)
        run: bandit -r ./src -ll
