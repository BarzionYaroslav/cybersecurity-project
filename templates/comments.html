<!DOCTYPE html>

<html lang="ru">
    <head>
        <title>XSS Demo</title>
        <meta charset="utf-8"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body class="d-flex flex-column min-vh-100">
        <header></header>
        <main>
            <div class="container">
                <form method="post" action="/comments" class="row g-3">
                <div class="mb-3">
                    <label for="exampleFormControlTextarea1" class="form-label">Comment space</label>
                    <textarea class="form-control" id="comment" name="comment" rows="3"></textarea>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary mb-3">Post a Comment</button>
                </div>
                </form>
            </div>
            {%for i in comments%}
            <div class="container">
                <div class="card mb-3">
                    <div class="row g-0">
                        <div class="col-md-1">
                            <img src="/static/Th02Rika.png" class="img-fluid rounded-start" alt="Rika">
                        </div>
                        <div class="col-md-8">
                            <div class="card-body">
                                <p class="card-text">{{i | safe}}</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            {%endfor%}
        </main>
        <footer class="mt-auto"></footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
